version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EXTRACTOR_URL: http://extrator-service:5000/processar
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE: ${DYNAMODB_TABLE:-employee_costs}
    ports:
      - "8000:8000"
    depends_on:
      - extrator
    networks:
      - etl-network

  extrator:
    build:
      context: .
      dockerfile: Dockerfile.extractor
    container_name: extrator-service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DYNAMODB_TABLE: ${DYNAMODB_TABLE:-employee_costs}
    ports:
      - "5000:5000"
    networks:
      - etl-network

networks:
  etl-network:
