name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Testes e Qualidade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Criar ambiente virtual
        run: python -m venv .venv

      - name: Instalar dependências
        run: |
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-cache-dir -r requirements.txt
          python -m pip install --no-cache-dir pytest ruff
          python -m pip show fastapi openpyxl pdfplumber

      - name: Rodar testes
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -v --tb=short

      - name: Verificar imports não utilizados
        run: |
          source .venv/bin/activate
          ruff check . --select F401 --exit-zero

  deploy:
    name: Deploy em Produção
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: 847564370007
      ECR_API_REPOSITORY: api-etl-api
      ECR_EXTRATOR_REPOSITORY: api-etl-extrator
      EC2_USER: ubuntu
      EC2_HOST: ${{ secrets.EC2_HOST }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir variáveis de imagem
        run: |
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"
          echo "API_IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_API_REPOSITORY}" >> "$GITHUB_ENV"
          echo "EXTRATOR_IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_EXTRATOR_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Build e push da imagem da API
        run: |
          docker build -f infra/docker/Dockerfile.api -t "$API_IMAGE:${GITHUB_SHA}" -t "$API_IMAGE:latest" .
          docker push "$API_IMAGE:${GITHUB_SHA}"
          docker push "$API_IMAGE:latest"

      - name: Build e push da imagem do extrator
        run: |
          docker build -f infra/docker/Dockerfile.extractor -t "$EXTRATOR_IMAGE:${GITHUB_SHA}" -t "$EXTRATOR_IMAGE:latest" .
          docker push "$EXTRATOR_IMAGE:${GITHUB_SHA}"
          docker push "$EXTRATOR_IMAGE:latest"

      - name: Preparar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/api-etl-deploy.pem
          chmod 600 ~/.ssh/api-etl-deploy.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Publicar na EC2
        run: |
          ssh -i ~/.ssh/api-etl-deploy.pem "$EC2_USER@$EC2_HOST" "AWS_REGION='$AWS_REGION' AWS_ACCOUNT_ID='$AWS_ACCOUNT_ID' ECR_API_REPOSITORY='$ECR_API_REPOSITORY' ECR_EXTRATOR_REPOSITORY='$ECR_EXTRATOR_REPOSITORY' bash -s" <<'REMOTE'
          set -euo pipefail

          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

          DATABASE_URL=$(docker inspect api-service --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep '^DATABASE_URL=' | cut -d= -f2-)
          DYNAMODB_TABLE=$(docker inspect api-service --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep '^DYNAMODB_TABLE=' | cut -d= -f2- || true)

          if [ -z "$DATABASE_URL" ]; then
            echo "Não foi possível recuperar DATABASE_URL do container atual."
            exit 1
          fi

          if [ -z "${DYNAMODB_TABLE:-}" ]; then
            DYNAMODB_TABLE="employee_costs"
          fi

          docker network create etl-network || true

          docker pull "$ECR_REGISTRY/$ECR_EXTRATOR_REPOSITORY:latest"
          docker pull "$ECR_REGISTRY/$ECR_API_REPOSITORY:latest"

          docker rm -f api-service extrator-service || true

          docker run -d --name extrator-service \
            --restart unless-stopped \
            --network etl-network \
            -e "DATABASE_URL=$DATABASE_URL" \
            -e "AWS_REGION=$AWS_REGION" \
            -e "DYNAMODB_TABLE=$DYNAMODB_TABLE" \
            -p 5000:5000 \
            "$ECR_REGISTRY/$ECR_EXTRATOR_REPOSITORY:latest"

          docker run -d --name api-service \
            --restart unless-stopped \
            --network etl-network \
            -e "DATABASE_URL=$DATABASE_URL" \
            -e "EXTRACTOR_URL=http://extrator-service:5000/processar" \
            -e "AWS_REGION=$AWS_REGION" \
            -e "DYNAMODB_TABLE=$DYNAMODB_TABLE" \
            -p 8000:8000 \
            "$ECR_REGISTRY/$ECR_API_REPOSITORY:latest"

          sudo systemctl restart nginx
          sleep 10
          echo "Deploy concluído para o commit $GITHUB_SHA"
          echo "Verificando health da API..."
          curl -fsS http://127.0.0.1:8000/health
          echo "Verificando Swagger via Nginx..."
          curl -fsS http://127.0.0.1/docs >/dev/null
          echo "Containers em execução:"
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
          echo "Nova versão publicada com sucesso."
          REMOTE
